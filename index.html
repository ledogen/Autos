<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RangerSim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #00ff88;
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    #pause-menu {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.82);
      border: 1px solid #444;
      padding: 28px 40px;
      font-family: monospace;
      font-size: 15px;
      color: #cccccc;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      z-index: 100;
      min-width: 200px;
    }
    #pause-menu .pm-title {
      color: #00ff88;
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    #pause-menu button {
      background: none;
      border: 1px solid #555;
      color: #cccccc;
      font-family: monospace;
      font-size: 14px;
      padding: 7px 18px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      transition: background 0.1s, color 0.1s;
    }
    #pause-menu button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border-color: #888;
    }
  </style>
  <!-- Bare specifiers ('three', 'three/addons/*', 'simplex-noise') are resolved by Vite from
       node_modules (PERF-04/PERF-20.5) — the old CDN importmap is retired. See vite.config.js. -->
</head>
<body>
  <!-- Canvas queried by main.js via document.querySelector('canvas') — no id required -->
  <canvas></canvas>

  <!-- FEAT-16: 2D top-down map overlay (dev/validation tool, toggled with M).
       Fullscreen 2d-context canvas above the WebGL canvas but below the pause menu
       (z 100). Hidden by default; src/map2d.js owns its draw + pan/zoom handlers. -->
  <canvas id="map2d" style="position:fixed; inset:0; display:none; z-index:90; background:rgba(10,12,16,0.92); cursor:grab;"></canvas>

  <!-- HUD overlay — Plan 03 wires speed readout; element must exist now -->
  <div id="hud">
    SPEED: <span id="speedVal">0.0</span> km/h<br>
    GEAR: <span id="gearVal">1</span> &nbsp; RPM: <span id="rpmVal">750</span> &nbsp; SPIN: <span id="spinVal">0.0</span><br>
    SLIP: <span id="slipVal">0.0&deg;</span><br>
    THR: <span id="thrVal">0</span>% &nbsp; BRK: <span id="brkVal">0</span>%<br>
    FPS: <span id="fpsVal">60</span><br>
    FL Fz: <span id="flFzVal">0</span> N &nbsp; FR Fz: <span id="frFzVal">0</span> N<br>
    RL Fz: <span id="rlFzVal">0</span> N &nbsp; RR Fz: <span id="rrFzVal">0</span> N<br>
    POS: <span id="posVal">seed 0 / 0 / 0</span>
  </div>

  <!-- Pause menu overlay (D-17) — shown on Esc from chase/hood mode; hidden in free-cam.
       Labels are fixed: "grid world" (exactly, D-18), "return to world", "resume".
       Button ids are wired in main.js: pm-resume, pm-grid, pm-return. -->
  <div id="pause-menu">
    <div class="pm-title">paused</div>
    <button id="pm-resume">resume</button>
    <button id="pm-grid">grid world</button>
    <button id="pm-return">return to world</button>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
