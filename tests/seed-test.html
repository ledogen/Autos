<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P7-1 Seed Determinism Test</title>
  <style>
    body { background: #111; color: #00ff88; font-family: monospace; font-size: 14px; padding: 20px; }
    .pass { color: #00ff88; }
    .fail { color: #ff4444; }
  </style>
  <!-- seed.js has no THREE dependency; importmap included for future test compatibility -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <h2>P7-1 Seed Determinism Gate</h2>
  <pre id="out">Running...</pre>
  <script type="module">
    import { parseWorldSeed, seedFor, mulberry32, djb2 } from '../src/seed.js'

    const out = document.getElementById('out')
    let failCount = 0

    function assert(label, cond, ...details) {
      if (cond) {
        const line = `PASS: ${label}`
        console.log(line)
        out.innerHTML += `<span class="pass">${line}</span>\n`
      } else {
        const line = `FAIL: ${label}` + (details.length ? '  ' + details.map(String).join(', ') : '')
        console.error(line)
        out.innerHTML += `<span class="fail">${line}</span>\n`
        failCount++
      }
    }

    function isUint32(v) {
      return Number.isInteger(v) && v >= 0 && v < 2 ** 32
    }

    // ── P7-1: Determinism ──────────────────────────────────────────────────────
    // Same inputs must always return the same unsigned 32-bit integer.
    const s = parseWorldSeed('lone-pine')
    const a1 = seedFor(s, 'coarse')
    const a2 = seedFor(s, 'coarse')
    assert('Determinism: seedFor same inputs → same output', a1 === a2, a1, a2)

    // ── P7-1: Domain independence ──────────────────────────────────────────────
    // 'coarse' vs 'fine' vs 'regional' must produce different sub-seeds.
    const sFine     = seedFor(s, 'fine')
    const sRegional = seedFor(s, 'regional')
    assert('Domain independence: coarse !== fine',     a1 !== sFine,     a1, sFine)
    assert('Domain independence: coarse !== regional', a1 !== sRegional, a1, sRegional)
    assert('Domain independence: fine !== regional',   sFine !== sRegional, sFine, sRegional)

    // ── P7-1: World distinctness ───────────────────────────────────────────────
    // Different worldSeeds must produce different sub-seeds for the same domain.
    const sOther = parseWorldSeed('other-seed')
    const aOther = seedFor(sOther, 'coarse')
    assert('World distinctness: lone-pine !== other-seed (coarse)', a1 !== aOther, a1, aOther)

    // ── P7-1: Parse equivalence (SEED-03) ─────────────────────────────────────
    // parseWorldSeed(integer N) === (N | 0) >>> 0
    assert('Parse equivalence: integer 42',   parseWorldSeed(42)   === ((42   | 0) >>> 0))
    assert('Parse equivalence: integer 0',    parseWorldSeed(0)    === ((0    | 0) >>> 0))
    assert('Parse equivalence: integer -1',   parseWorldSeed(-1)   === ((-1   | 0) >>> 0))
    assert('Parse equivalence: integer 9999', parseWorldSeed(9999) === ((9999 | 0) >>> 0))
    // parseWorldSeed(string) === djb2(string)
    assert('Parse equivalence: string lone-pine === djb2(lone-pine)',
      parseWorldSeed('lone-pine') === djb2('lone-pine'))
    assert('Parse equivalence: empty string === djb2("")',
      parseWorldSeed('') === djb2(''))

    // ── P7-1: Coord stream mixing (SEED-02 forward-looking) ───────────────────
    // Coords must mix into the sub-seed — different coords → different sub-seeds.
    const r00 = seedFor(s, 'road', 0, 0)
    const r10 = seedFor(s, 'road', 1, 0)
    const r01 = seedFor(s, 'road', 0, 1)
    assert('Coord mix: road(0,0) !== road(1,0)', r00 !== r10, r00, r10)
    assert('Coord mix: road(0,0) !== road(0,1)', r00 !== r01, r00, r01)
    // No coords vs with coords must also differ
    const rNoCoord = seedFor(s, 'road')
    assert('Coord mix: road() !== road(0,0)', rNoCoord !== r00, rNoCoord, r00)

    // ── P7-1: Unsigned 32-bit range ────────────────────────────────────────────
    // Every return value must be an integer in [0, 2^32).
    assert('Unsigned range: parseWorldSeed("lone-pine")', isUint32(s))
    assert('Unsigned range: parseWorldSeed("other-seed")', isUint32(sOther))
    assert('Unsigned range: seedFor coarse', isUint32(a1))
    assert('Unsigned range: seedFor fine', isUint32(sFine))
    assert('Unsigned range: seedFor regional', isUint32(sRegional))
    assert('Unsigned range: seedFor road(0,0)', isUint32(r00))

    // ── P7-1: mulberry32 PRNG ─────────────────────────────────────────────────
    // mulberry32 must return a function that outputs [0,1) floats deterministically.
    const rng1 = mulberry32(seedFor(s, 'coarse'))
    const rng2 = mulberry32(seedFor(s, 'coarse'))
    const v1 = rng1()
    const v2 = rng2()
    assert('mulberry32: same seed → same first value', v1 === v2, v1, v2)
    assert('mulberry32: output in [0, 1)', v1 >= 0 && v1 < 1, v1)
    // Different seeds → different PRNG sequences
    const rng3 = mulberry32(seedFor(s, 'fine'))
    const v3 = rng3()
    assert('mulberry32: different seeds → different first values', v1 !== v3, v1, v3)
    // Draw 256 values — should not repeat the pattern from a different seed
    const rng4 = mulberry32(seedFor(s, 'coarse'))
    let allInRange = true
    for (let i = 0; i < 256; i++) {
      const v = rng4()
      if (v < 0 || v >= 1) { allInRange = false; break }
    }
    assert('mulberry32: 256 draws all in [0, 1)', allInRange)

    // ── Summary ────────────────────────────────────────────────────────────────
    const summary = failCount === 0
      ? `\nP7-1 PASS: seed determinism verified (0 failures)`
      : `\nP7-1 FAIL: ${failCount} assertion(s) failed`
    out.innerHTML += `<span class="${failCount === 0 ? 'pass' : 'fail'}">${summary}</span>\n`
    if (failCount === 0) {
      console.log('P7-1 PASS: seed determinism verified')
    } else {
      console.error(`P7-1 FAIL: ${failCount} assertion(s) failed`)
    }
  </script>
</body>
</html>
