<body>
  <h1>RangerSim — Road Seam Continuity Exit Gate (D-06)</h1>
  <p>Open DevTools console to see PASS/FAIL results.</p>
  <p>This page IS the phase exit gate. All seam assertions must PASS before Phase 9 begins.</p>

  <script type="module">
    import { RoadSystem } from '../src/road.js'
    import { parseWorldSeed } from '../src/seed.js'
    import { assert, TEST_PARAMS } from './road-test-harness.js'

    // ── Helper: clamp for acos input ───────────────────────────────────────────
    function clamp(v, lo, hi) { return v < lo ? lo : v > hi ? hi : v }

    // ── Helper: angle in degrees between two unit tangent vectors ──────────────
    function angleBetween(a, b) {
        // dot product of two unit vectors; clamp to [-1,1] to guard floating-point drift
        const dot = a.x * b.x + a.y * b.y + a.z * b.z
        return Math.acos(clamp(dot, -1, 1)) * (180 / Math.PI)
    }

    // ── D-06: C1 seam-continuity exit gate ────────────────────────────────────
    // For each east-west adjacent tile pair in a 3×3 grid, assert:
    //   (a) C0: getPoint(1.0) of tile A ≈ getPoint(0.0) of tile B (< 0.01 m)
    //   (b) C1: angle(getTangentAt(1.0) of A, getTangentAt(0.0) of B) < 5°
    // This is the EXIT GATE for Phase 8 — must be green before Phase 9 builds any
    // ribbon mesh on these splines (D-06 in 08-CONTEXT.md and 08-RESEARCH.md).
    ;(function testSeamContinuity() {
        const ws = parseWorldSeed('lone-pine')
        const road = new RoadSystem(ws, TEST_PARAMS)

        // Eagerly generate the full 3×3 tile grid (-1..1 × -1..1)
        for (let tX = -1; tX <= 1; tX++) {
            for (let tZ = -1; tZ <= 1; tZ++) {
                road.ensureTile(tX, tZ)
            }
        }

        let totalSeams = 0
        let maxAngle   = 0
        let anyFail    = false

        // Check all east-west adjacent pairs: (tX, tZ) → (tX+1, tZ)
        for (let tZ = -1; tZ <= 1; tZ++) {
            for (let tX = -1; tX <= 0; tX++) {  // pairs: (-1,tZ)→(0,tZ) and (0,tZ)→(1,tZ)
                const tileA = road._getTile(tX,     tZ)
                const tileB = road._getTile(tX + 1, tZ)

                if (!tileA || !tileA.spline || !tileB || !tileB.spline) {
                    assert(`D-06 seam tiles exist (${tX},${tZ})→(${tX+1},${tZ})`, false)
                    anyFail = true
                    continue
                }

                // C0: position continuity — end of A ≈ start of B
                const endA   = tileA.spline.getPoint(1.0)
                const startB = tileB.spline.getPoint(0.0)
                const c0dist = endA.distanceTo(startB)
                const c0ok   = c0dist < 0.01
                assert(
                    `D-06 seam C0 (${tX},${tZ})→(${tX+1},${tZ}): dist=${c0dist.toFixed(4)}m < 0.01m`,
                    c0ok
                )
                if (!c0ok) anyFail = true

                // C1: tangent continuity — angle between end tangent of A and start tangent of B
                const tanA = tileA.spline.getTangentAt(1.0)
                const tanB = tileB.spline.getTangentAt(0.0)
                const angleDeg = angleBetween(tanA, tanB)
                const c1ok = angleDeg < 5
                assert(
                    `D-06 seam C1 (${tX},${tZ})→(${tX+1},${tZ}): angle=${angleDeg.toFixed(2)}° < 5°`,
                    c1ok
                )
                if (!c1ok) anyFail = true

                if (angleDeg > maxAngle) maxAngle = angleDeg
                totalSeams++
            }
        }

        // Summary
        console.log(`--- Seam continuity summary ---`)
        console.log(`  Seams checked: ${totalSeams}`)
        console.log(`  Max tangent angle at seam: ${maxAngle.toFixed(2)}°`)
        console.log(`  EXIT GATE D-06: ${anyFail ? 'FAIL' : 'PASS'}`)
        assert('D-06 EXIT GATE: all seams C1 (no kink > 5° at any 64 m boundary)', !anyFail)
    })()

    // ── Determinism: same seed → same tangents on two runs ────────────────────
    ;(function testSeamDeterminism() {
        const ws = parseWorldSeed('lone-pine')
        const r1 = new RoadSystem(ws, TEST_PARAMS)
        const r2 = new RoadSystem(ws, TEST_PARAMS)

        // Generate the same tile on both instances
        r1.ensureTile(0, 0)
        r1.ensureTile(1, 0)
        r2.ensureTile(0, 0)
        r2.ensureTile(1, 0)

        const tanA1 = r1._getTile(0, 0).spline.getTangentAt(1.0)
        const tanA2 = r2._getTile(0, 0).spline.getTangentAt(1.0)

        const diff = Math.sqrt(
            (tanA1.x - tanA2.x) ** 2 +
            (tanA1.y - tanA2.y) ** 2 +
            (tanA1.z - tanA2.z) ** 2
        )
        assert('D-06 determinism: same seed → same tangent on tile(0,0) at t=1.0', diff < 1e-9)
    })()

    console.log('--- test-road-seam.html complete ---')
  </script>
</body>
