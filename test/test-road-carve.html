<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RangerSim — Road Carve Tests</title>
  <!-- importmap copied verbatim from index.html (MUST appear before module scripts) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
      "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js"
    }
  }
  </script>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 1em; }
    h1 { font-size: 1.1em; }
    p { font-size: 0.85em; color: #aaa; }
  </style>
</head>
<body>
  <h1>RangerSim Road Carve Tests</h1>
  <p>Open DevTools console to see PASS/FAIL results.</p>
  <p>BUG-08 window-invariance assertion (Plan 09-01). Carve/continuity assertions added in Plan 09-02.</p>

  <script type="module">
    import * as THREE from 'three'
    import { RoadSystem } from '../src/road.js'
    import { parseWorldSeed } from '../src/seed.js'
    import { crownProfile } from '../src/road-carve.js'
    import { assert, TEST_PARAMS } from './road-test-harness.js'

    // ── Harness loads ──────────────────────────────────────────────────────────
    assert('harness loads', true)

    // ── BUG-08: Window-invariance assertion ───────────────────────────────────
    // Fixed world XZ positions that lie where the road network is dense.
    // The test streams the road at center A, records queryNearest results at 5
    // world positions, then shifts the stream center by > PROTO_REGEN_MOVE (96 m)
    // to trigger a real re-stream, and verifies the results are identical.
    //
    // Tolerance: point delta < 0.01 m, tangent delta < 0.001 (near-unit vectors).
    // Both must hold for the fix (D-16 canonical per-run derivation) to be valid.
    ;(async function testBug08WindowInvariance() {
        const ws = parseWorldSeed('lone-pine')
        const rs = new RoadSystem(ws, TEST_PARAMS)

        // Center A: warm the network around origin. Use a 3×3 tile grid so the
        // road system has runs to query across several tiles.
        const centerA = new THREE.Vector3(0, 0, 0)
        for (let tx = -2; tx <= 2; tx++) {
            for (let tz = -2; tz <= 2; tz++) {
                rs.ensureTile(tx, tz)
            }
        }

        // Pick 5 query positions that should be near (within 200 m) of road geometry.
        // We use positions spread across the initial stream window.
        const probePositions = [
            [  64,    0],
            [ 128,   64],
            [  32,  128],
            [ -64,   32],
            [ 192,  -64],
        ]

        // Record queryNearest at each position from center A stream.
        const resultsA = probePositions.map(([wx, wz]) => rs.queryNearest(wx, wz, 400))

        // Shift center to B — more than PROTO_REGEN_MOVE = 96 m away to force a re-stream.
        // Use (300, 0, 0) — 300 m in X, well past the 96 m threshold.
        const centerB = new THREE.Vector3(300, 0, 0)
        rs._streamNetwork(centerB)
        rs._sliceNetwork()
        // Warm the same tile neighborhood around center B.
        const bTX = Math.floor(centerB.x / 64)
        const bTZ = Math.floor(centerB.z / 64)
        for (let tx = bTX - 2; tx <= bTX + 2; tx++) {
            for (let tz = bTZ - 2; tz <= bTZ + 2; tz++) {
                rs.ensureTile(tx, tz)
            }
        }

        // Re-query the SAME 5 world positions from center B stream.
        const resultsB = probePositions.map(([wx, wz]) => rs.queryNearest(wx, wz, 400))

        // Assert: for each probe position that returned a result from both streams,
        // point delta < 0.01 m and tangent delta < 0.001.
        let anyRoadFound = false
        for (let i = 0; i < probePositions.length; i++) {
            const [wx, wz] = probePositions[i]
            const a = resultsA[i]
            const b = resultsB[i]
            if (a === null && b === null) {
                // No road near this probe — counts as trivially invariant.
                assert(`BUG-08 window-invariance (${wx},${wz}): both null (no road in range) — trivially invariant`, true)
                continue
            }
            if (a === null || b === null) {
                // One stream found a road, the other did not. This is a failure.
                assert(`BUG-08 window-invariance (${wx},${wz}): road visibility inconsistent across streams`, false)
                continue
            }
            anyRoadFound = true
            const dP = a.point.distanceTo(b.point)
            const dT = a.tangent.distanceTo(b.tangent)
            assert(
                `BUG-08 window-invariance (${wx},${wz}): dP=${dP.toFixed(4)}m < 0.01`,
                dP < 0.01
            )
            assert(
                `BUG-08 window-invariance (${wx},${wz}): dT=${dT.toFixed(5)} < 0.001`,
                dT < 0.001
            )
        }

        // At least one position should have found road geometry (sanity).
        assert('BUG-08 window-invariance: at least one probe position found road geometry', anyRoadFound)

    })()

    // ── SURF-05 / SURF-04 height-agreement and carve-continuity assertions ───────
    // EXIT GATE (Plan 09-02): carve blend spec locked.
    // These tests verify the pure carve functions (road-carve.js) directly —
    // no TerrainSystem/Worker needed for these assertions.
    ;(async function testCarvePureFunctions() {
        const { sampleCarve, crownProfile, carveBlend } = await import('../src/road-carve.js')

        // ── carveBlend: on-ribbon ────────────────────────────────────────────────
        {
            const raw = 10, designY = 15, halfW = 5, shoulderW = 2.5
            const result = carveBlend(raw, 3, designY, halfW, shoulderW)
            assert('SURF-05 carveBlend on-ribbon (dist<halfW): returns designGradeY',
                Math.abs(result - designY) < 1e-9)
        }

        // ── carveBlend: shoulder blend at t=0.5 ──────────────────────────────────
        {
            const raw = 10, designY = 20, halfW = 5, shoulderW = 4
            const dist = halfW + shoulderW / 2
            const expected = raw + 0.5 * (designY - raw)
            const result = carveBlend(raw, dist, designY, halfW, shoulderW)
            assert(`SURF-05 carveBlend shoulder t=0.5: result=${result.toFixed(3)} expected=${expected.toFixed(3)}`,
                Math.abs(result - expected) < 1e-6)
        }

        // ── carveBlend: beyond shoulder → raw terrain ─────────────────────────────
        {
            const raw = 10, designY = 20, halfW = 5, shoulderW = 2.5
            const result = carveBlend(raw, halfW + shoulderW + 1, designY, halfW, shoulderW)
            assert('SURF-05 carveBlend beyond shoulder: returns raw terrain',
                Math.abs(result - raw) < 1e-9)
        }

        // ── carveBlend: fill case ─────────────────────────────────────────────────
        {
            const raw = 5, designY = 7, halfW = 5, shoulderW = 2.5
            const onRibbon = carveBlend(raw, 0, designY, halfW, shoulderW)
            assert('SURF-05 carveBlend fill case: on-ribbon returns designGradeY',
                Math.abs(onRibbon - designY) < 1e-9)
        }

        // ── carveBlend: cut case ──────────────────────────────────────────────────
        {
            const raw = 15, designY = 10, halfW = 5, shoulderW = 2.5
            const onRibbon = carveBlend(raw, 0, designY, halfW, shoulderW)
            assert('SURF-05 carveBlend cut case: on-ribbon returns designGradeY',
                Math.abs(onRibbon - designY) < 1e-9)
        }

        // ── crownProfile: shape checks ────────────────────────────────────────────
        {
            const peak = crownProfile(0, 5, 0.05)
            const edge = crownProfile(5, 5, 0.05)
            const mid  = crownProfile(2.5, 5, 0.05)
            assert(`SURF-05 crownProfile: peak at centerline=${peak.toFixed(4)}`,
                Math.abs(peak - 0.05) < 1e-9)
            assert(`SURF-05 crownProfile: zero at edge=${edge.toFixed(6)}`,
                Math.abs(edge) < 1e-9)
            assert(`SURF-05 crownProfile: midpoint in (0,0.05): ${mid.toFixed(4)}`,
                mid > 0 && mid < 0.05)
        }

        // ── crownProfile: symmetry ────────────────────────────────────────────────
        {
            const left  = crownProfile(-2, 5, 0.05)
            const right = crownProfile( 2, 5, 0.05)
            assert(`SURF-04 crownProfile symmetry: crownProfile(-2)==crownProfile(2)`,
                Math.abs(left - right) < 1e-9)
        }

        // ── sampleCarve: bilinear interpolation ───────────────────────────────────
        {
            const N = 3, cellSize = 1.0, originX = 0, originZ = 0
            const table = new Float32Array(N * N * 2)
            const centerIdx = (1 * N + 1) * 2
            table[centerIdx]     = 1.0
            table[centerIdx + 1] = 5.0
            const c = sampleCarve(1.0, 1.0, table, N, originX, originZ, cellSize)
            assert(`SURF-05 sampleCarve center vertex: blendW=${c.blendW.toFixed(3)}==1`,
                Math.abs(c.blendW - 1.0) < 1e-6)
            assert(`SURF-05 sampleCarve center vertex: gradeY=${c.gradeY.toFixed(3)}==5`,
                Math.abs(c.gradeY - 5.0) < 1e-6)
            const c2 = sampleCarve(0.5, 0.5, table, N, originX, originZ, cellSize)
            assert(`SURF-05 sampleCarve (0.5,0.5) bilinear: blendW=${c2.blendW.toFixed(4)}≈0.25`,
                Math.abs(c2.blendW - 0.25) < 1e-6)
        }

        // ── SURF-05 carve-continuity: fill scenario ───────────────────────────────
        // Step across carve boundary at 0.25 m increments; no step > allowed slope * step.
        {
            const raw = 5, designY = 8, halfW = 5, shoulderW = 2.5
            const step = 0.25
            const allowedSlope = (designY - raw) / shoulderW  // max slope = rise/shoulderWidth
            const allowedMax   = allowedSlope * step + 0.01
            let maxStep = 0
            let prev = carveBlend(raw, 0, designY, halfW, shoulderW)
            for (let d = step; d <= halfW + shoulderW + 2; d += step) {
                const cur = carveBlend(raw, d, designY, halfW, shoulderW)
                maxStep = Math.max(maxStep, Math.abs(cur - prev))
                prev = cur
            }
            assert(`SURF-05 carve-continuity fill (3m): maxStep=${maxStep.toFixed(4)}m < ${allowedMax.toFixed(4)}m`,
                maxStep < allowedMax)
        }

        // ── SURF-05 carve-continuity: cut scenario ────────────────────────────────
        {
            const raw = 12, designY = 8, halfW = 5, shoulderW = 2.5
            const step = 0.25
            const allowedSlope = (raw - designY) / shoulderW
            const allowedMax   = allowedSlope * step + 0.01
            let maxStep = 0
            let prev = carveBlend(raw, 0, designY, halfW, shoulderW)
            for (let d = step; d <= halfW + shoulderW + 2; d += step) {
                const cur = carveBlend(raw, d, designY, halfW, shoulderW)
                maxStep = Math.max(maxStep, Math.abs(cur - prev))
                prev = cur
            }
            assert(`SURF-05 carve-continuity cut (4m): maxStep=${maxStep.toFixed(4)}m < ${allowedMax.toFixed(4)}m`,
                maxStep < allowedMax)
        }

        // ── SURF-05 carve monotonicity: fill case ──────────────────────────────────
        // Moving away from centerline should monotonically decrease toward raw terrain.
        {
            const raw = 10, designY = 15, halfW = 5, shoulderW = 2.5
            let prev = carveBlend(raw, 0, designY, halfW, shoulderW)
            let monotonic = true
            for (let d = 0.1; d <= halfW + shoulderW + 1; d += 0.1) {
                const cur = carveBlend(raw, d, designY, halfW, shoulderW)
                if (cur > prev + 1e-9) { monotonic = false; break }
                prev = cur
            }
            assert('SURF-05 carveBlend fill monotonically decreases from center to far', monotonic)
        }

        console.log('SURF-04/SURF-05 pure-function exit gates: all checks complete.')
    })()

    // ── SURF-03: crown + camber normal direction assertion (Plan 09-03) ───────
    // Verifies that crownProfile + camber tilt in the gradeY formula produce the
    // expected surface characteristics:
    //  1. Crown: on the right half of the road (uLat > 0), crownProfile < crownHeight
    //     (peak is at centerline, 0 at edges) — lateral gradient exists.
    //  2. Camber sign: positive curvature (left turn) → negative camberAngle → right
    //     side of road is higher than left (banks into the right turn). This matches the
    //     highway banking convention: turn left → bank right (inside-low).
    //  3. Camber formula: uLat * sin(camberAngle) — sign is consistent with the
    //     sweepRibbon implementation.
    ;(function testSurf03CrownCamberNormal() {
        // ── Crown assertion ─────────────────────────────────────────────────
        // crownProfile(uLat, halfWidth, crownHeight):
        //   peak at uLat=0 (centerline), 0 at uLat=±halfWidth
        const halfWidth    = 5
        const crownHeight  = 0.05
        const crownCenter  = crownProfile(0,          halfWidth, crownHeight)
        const crownMid     = crownProfile(halfWidth/2, halfWidth, crownHeight)
        const crownEdge    = crownProfile(halfWidth,   halfWidth, crownHeight)

        assert('SURF-03 crown peak at centerline = crownHeight', Math.abs(crownCenter - crownHeight) < 1e-9)
        assert('SURF-03 crown at edge = 0', Math.abs(crownEdge) < 1e-9)
        assert('SURF-03 crown midpoint is between 0 and peak', crownMid > 0 && crownMid < crownHeight)
        // Lateral gradient: right side (uLat>0) is lower than centerline → correct water shedding.
        assert('SURF-03 crown right > center > edge (symmetric shed)', crownCenter > crownMid && crownMid > crownEdge)

        // ── Camber direction assertion ───────────────────────────────────────
        // When curvature is positive (left turn, cross product > 0), signedKappa > 0.
        // camberAngle = camberStrength * signedKappa → positive.
        // tiltY = uLat * sin(camberAngle):
        //   left edge (uLat = -halfWidth): tiltY = -halfWidth * sin(angle) < 0 → lower
        //   right edge (uLat = +halfWidth): tiltY = +halfWidth * sin(angle) > 0 → higher
        // Net: left turn banks the right side UP and left side DOWN → inside (left) is lower.
        // This is correct road banking: turn left → bank toward right (inside-low).
        const camberStrength = 200
        const radius = 50           // m — typical tight turn
        const signedKappa = 1 / radius  // positive = left turn
        const rawCamber = camberStrength * signedKappa  // 200 * 0.02 = 4°
        const MAX_CAMBER = 6 * (Math.PI / 180)
        const camberAngle = Math.max(-MAX_CAMBER, Math.min(MAX_CAMBER, rawCamber))

        // For a left turn: right edge (uLat = +halfWidth) should be higher (tiltY > 0)
        const tiltRight = halfWidth * Math.sin(camberAngle)
        const tiltLeft  = (-halfWidth) * Math.sin(camberAngle)
        assert('SURF-03 camber direction: left turn → right edge higher (banks inside)', tiltRight > 0)
        assert('SURF-03 camber direction: left turn → left edge lower (banks inside)', tiltLeft < 0)

        // The lateral normal component of the cambered surface:
        // If right is higher and left is lower, the normal tilts toward the left (inside of turn).
        // This is verified by the sign: d(vy)/d(uLat) ≈ sin(camberAngle) > 0 for left turn.
        // analyticNormal uses central differences: nx = -(hR - hL) / (2 * EPS).
        // Higher on right (hR > hL) → nx = -(positive) < 0 → normal tilts left (toward inside).
        const heightAtRight = 10 + tiltRight   // design grade + tilt
        const heightAtLeft  = 10 + tiltLeft    // design grade + tilt
        const approxNx = -(heightAtRight - heightAtLeft) / (2 * halfWidth)
        assert(`SURF-03 camber direction (x component): banks inside (nx=${approxNx.toFixed(3)})`, approxNx < 0)

        // ── Crown produces non-zero lateral gradient ─────────────────────────
        // At uLat = halfWidth/2: crownProfile is non-zero, meaning the surface is not flat.
        const crownGradient = crownCenter - crownEdge   // height drop from center to edge
        assert('SURF-03 crown lateral gradient is non-zero', crownGradient > 0)

        console.log('SURF-03 crown + camber direction assertions complete.')
    })()

  </script>
</body>
</html>
