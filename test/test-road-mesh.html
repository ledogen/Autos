<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RangerSim — Road Mesh Tests</title>
  <!-- importmap copied verbatim from index.html (MUST appear before module scripts) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
      "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js"
    }
  }
  </script>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 1em; }
    h1 { font-size: 1.1em; }
    p { font-size: 0.85em; color: #aaa; }
  </style>
</head>
<body>
  <h1>RangerSim Road Mesh Tests</h1>
  <p>Open DevTools console to see PASS/FAIL results.</p>
  <p>SURF-01 ribbon mesh smoke (Plan 09-03). SURF-02/07 added in Plans 09-04/09-05.</p>

  <script type="module">
    import * as THREE from 'three'
    import { RoadSystem, CHUNK_SIZE } from '../src/road.js'
    import { RoadMeshSystem } from '../src/road-mesh.js'
    import { parseWorldSeed } from '../src/seed.js'
    import { assert, TEST_PARAMS } from './road-test-harness.js'

    // ── Harness loads ──────────────────────────────────────────────────────────
    assert('harness loads', true)

    // ── Minimal THREE scene scaffold (smoke test) ─────────────────────────────
    ;(function testSceneConstruct() {
        let ok = false
        try {
            const scene    = new THREE.Scene()
            const camera   = new THREE.PerspectiveCamera(60, 1, 0.1, 2000)
            const renderer = new THREE.WebGLRenderer({ antialias: false })
            renderer.setSize(256, 256)
            const light    = new THREE.DirectionalLight(0xffffff, 1)
            scene.add(light)
            camera.position.set(0, 100, 200)
            camera.lookAt(0, 0, 0)
            renderer.render(scene, camera)
            renderer.dispose()
            ok = true
        } catch (e) {
            console.error('Scene construction threw:', e)
        }
        assert('harness scene constructed (r184 importmap + WebGLRenderer ok)', ok)
    })()

    // ── SURF-01: ribbon mesh smoke — RoadMeshSystem builds geometry ───────────
    // Constructs a RoadSystem over a fixed seed, warms one tile, then calls
    // _buildRoadTile directly to get the ribbon geometry. Asserts:
    //   - geometry has > 0 vertices
    //   - normal at a centerline vertex is finite and length ≈ 1 (non-degenerate)
    //   - geometry has an index buffer (quad strip indexed)
    ;(async function testSurf01RibbonMeshSmoke() {
        try {
            const ws  = parseWorldSeed('lone-pine')
            const params = Object.assign({}, TEST_PARAMS, {
                crownHeight:   0.05,
                camberStrength: 200,
            })

            const scene = new THREE.Scene()
            const rs    = new RoadSystem(ws, params)

            // Fake terrain ref: flat terrain at height 10
            const terrainRef = (x, z) => 10

            // Warm the road network around origin so _tiles has data.
            rs.ensureTile(0, 0)
            rs.ensureTile(1, 0)
            rs.ensureTile(-1, 0)

            const rms = new RoadMeshSystem(scene, rs, terrainRef, params)

            // Find a tile that actually has road slices.
            let foundTile = null
            for (let tx = -2; tx <= 2 && !foundTile; tx++) {
                for (let tz = -2; tz <= 2 && !foundTile; tz++) {
                    const key = `${tx},${tz}`
                    const segs = rs._tiles.get(key)
                    if (segs && segs.length > 0 && segs[0].spline) {
                        foundTile = { tx, tz, key }
                    }
                }
            }

            if (!foundTile) {
                assert('SURF-01 ribbon mesh built (found road tile to test)', false)
                return
            }

            const { tx, tz, key } = foundTile
            // Build the road tile synchronously via the private method (bypasses queue for test).
            rms._buildRoadTile(tx, tz, key)

            const entry = rms._tileMeshMap.get(key)
            assert('SURF-01 road tile built (entry in tileMeshMap)', !!entry)

            if (!entry || entry.meshes.length === 0) {
                assert('SURF-01 ribbon mesh built (has at least one mesh)', false)
                return
            }

            const mesh = entry.meshes[0]
            const geo  = mesh.geometry
            const pos  = geo.attributes.position

            const vertCount = pos.count
            assert(`SURF-01 ribbon mesh built (verts=${vertCount})`, vertCount > 0)

            // Check that normals were computed and are finite unit-length.
            const nrm = geo.attributes.normal
            assert('SURF-01 ribbon has vertex normals attribute', !!nrm)

            if (nrm) {
                // Sample the centerline normal (vertex at lateral center of first section).
                // Centerline vertex index: section 0, lateral vertex at CROSS_SEGS/2.
                const CROSS_SEGS = 8
                const centerIdx = Math.floor(CROSS_SEGS / 2)  // vertex 4 of 9
                const nx = nrm.getX(centerIdx)
                const ny = nrm.getY(centerIdx)
                const nz = nrm.getZ(centerIdx)
                const normalLen = Math.sqrt(nx*nx + ny*ny + nz*nz)
                const isFinite = Number.isFinite(nx) && Number.isFinite(ny) && Number.isFinite(nz)
                const isUnit   = Math.abs(normalLen - 1.0) < 0.01
                assert('SURF-01 centerline vertex normal is finite', isFinite)
                assert('SURF-01 centerline vertex normal length ≈ 1 (non-degenerate)', isUnit)
            }

            // Check index buffer exists (quad strip indexed).
            assert('SURF-01 ribbon has index buffer', !!geo.index)

            // Dispose test resources.
            for (const g of entry.geometries) g.dispose()
        } catch (e) {
            console.error('SURF-01 test threw:', e)
            assert('SURF-01 ribbon mesh smoke: no exception', false)
        }
    })()

    // ── SURF-02 asphalt material smoke ────────────────────────────────────────
    // Verify RoadMeshSystem uses vertex colors (asphalt dark grey baked in buffer).
    ;(async function testSurf02AsphaltMaterial() {
        try {
            const ws = parseWorldSeed('lone-pine')
            const params = Object.assign({}, TEST_PARAMS, { crownHeight: 0.05, camberStrength: 200 })
            const scene = new THREE.Scene()
            const rs = new RoadSystem(ws, params)
            const terrainRef = (x, z) => 10
            rs.ensureTile(0, 0)
            const rms = new RoadMeshSystem(scene, rs, terrainRef, params)

            let foundTile = null
            for (let tx = -2; tx <= 2 && !foundTile; tx++) {
                for (let tz = -2; tz <= 2 && !foundTile; tz++) {
                    const key = `${tx},${tz}`
                    const segs = rs._tiles.get(key)
                    if (segs && segs.length > 0 && segs[0].spline) foundTile = { tx, tz, key }
                }
            }
            if (!foundTile) { assert('SURF-02 asphalt: found road tile', false); return }
            const { tx, tz, key } = foundTile
            rms._buildRoadTile(tx, tz, key)
            const entry = rms._tileMeshMap.get(key)
            if (!entry || entry.meshes.length === 0) { assert('SURF-02 asphalt: has mesh', false); return }
            const geo = entry.meshes[0].geometry
            const colorAttr = geo.attributes.color
            assert('SURF-02 asphalt material: vertex color attribute present', !!colorAttr)
            if (colorAttr) {
                // Dark cool grey: R ≈ 0.15, G ≈ 0.15, B ≈ 0.17
                const r = colorAttr.getX(0), g = colorAttr.getY(0), b = colorAttr.getZ(0)
                const isDarkGrey = r < 0.3 && g < 0.3 && b < 0.3
                assert(`SURF-02 asphalt vertex color is dark grey (r=${r.toFixed(2)},g=${g.toFixed(2)},b=${b.toFixed(2)})`, isDarkGrey)
            }
            for (const g of entry.geometries) g.dispose()
        } catch (e) {
            console.error('SURF-02 test threw:', e)
            assert('SURF-02 asphalt material smoke: no exception', false)
        }
    })()

    // ── SURF-07: Junction footprint (Plan 09-04) ──────────────────────────────
    // Runs _detectJunctions, verifies buildJunctionFootprint returns a valid geometry.
    // No-z-fight assertion: polygon |area| > 1 m² (non-degenerate = legs cannot overlap
    // the footprint with coplanar quads).
    ;(async function testSurf07JunctionFootprint() {
        try {
            const seeds = ['junction-test', 'lone-pine', 'alpine-ridge', 'valley-run', 'crossroads']
            const params = Object.assign({}, TEST_PARAMS, {
                crownHeight:   0.05,
                camberStrength: 200,
                roadHalfWidth:  5,
                roadWidth:      10,
                roadFilletRadius: 5,
                roadJunctionBlendLength: 30,
            })
            const terrainRef = (x, z) => 10
            const scene = new THREE.Scene()

            let junctions = new Map()
            let rs = null
            let rms = null

            // Try multiple seeds + warms to find at least one crossing.
            for (const seedStr of seeds) {
                const ws = parseWorldSeed(seedStr)
                rs = new RoadSystem(ws, params)
                const R = 6
                for (let tx = -R; tx <= R; tx++) {
                    for (let tz = -R; tz <= R; tz++) { rs.ensureTile(tx, tz) }
                }
                junctions = rs._detectJunctions()
                if (junctions.size > 0) break
            }

            assert(`SURF-07 _detectJunctions returns Map`, junctions instanceof Map)

            if (junctions.size === 0) {
                // No crossings found in any tried seed — road network produces only
                // parallel rows. Mark as informational pass.
                assert('SURF-07 note: no crossings found across 5 seeds (roads parallel — valid, junction skipped)', true)
                return
            }

            rms = new RoadMeshSystem(scene, rs, terrainRef, params)
            const [, node] = junctions.entries().next().value
            const geo = rms.buildJunctionFootprint(node, params)

            assert('SURF-07 junction footprint built (geometry non-null)', !!geo)

            if (geo) {
                const posAttr = geo.attributes.position
                const vertCount = posAttr.count
                assert(`SURF-07 junction footprint built (verts=${vertCount})`, vertCount > 0)

                const idxBuf = geo.index
                const triCount = idxBuf ? idxBuf.count / 3 : 0
                assert(`SURF-07 junction footprint has triangles (tris=${Math.round(triCount)})`, triCount >= 1)

                // All vertex Y must equal node.nodeY (flat paved — D-13).
                let allFlat = true
                for (let i = 0; i < vertCount; i++) {
                    const y = posAttr.getY(i)
                    if (Math.abs(y - node.nodeY) > 0.01) { allFlat = false; break }
                }
                assert('SURF-07 junction footprint is flat at nodeY (crown=0, camber=0, D-13)', allFlat)

                // No-z-fight: footprint polygon area must be > 1 m².
                const poly = []
                for (let i = 0; i < vertCount; i++) {
                    poly.push({ x: posAttr.getX(i), z: posAttr.getZ(i) })
                }
                let area = 0
                for (let i = 0; i < poly.length; i++) {
                    const a = poly[i], b = poly[(i + 1) % poly.length]
                    area += a.x * b.z - b.x * a.z
                }
                const absArea = Math.abs(area * 0.5)
                assert(`SURF-07 no-z-fight: footprint non-degenerate (|area|=${absArea.toFixed(1)} m²)`, absArea > 1)

                // Winding check: signed area must be positive after winding correction.
                const signedArea = area * 0.5
                assert(`SURF-07 footprint polygon winding is CCW (signedArea=${signedArea.toFixed(1)})`, signedArea >= 0)

                assert('PASS SURF-07 junction footprint built', true)
                geo.dispose()
            }
        } catch (e) {
            console.error('SURF-07 test threw:', e)
            assert('SURF-07 junction footprint smoke: no exception', false)
        }
    })()

  </script>
</body>
</html>
